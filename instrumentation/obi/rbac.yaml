---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obi
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: obi
rules:
  # Esto se ocupa para descubrir los pods para instrumentar
  - apiGroups: [""]
    resources:
      - pods
      - services
      - nodes
      - namespaces
    verbs:
      - get
      - list
      - watch

  # Necesario para leer configuración de deployments
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: obi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: obi
subjects:
  - kind: ServiceAccount
    name: obi
    namespace: default  # O tu namespace
