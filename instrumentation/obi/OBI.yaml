---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: obi
  labels:
    app: obi
spec:
  selector:
    matchLabels:
      app: obi
  template:
    metadata:
      labels:
        app: obi
    spec:
      # Needed for the pod metadata lookups granted in rbac.yaml.
      serviceAccountName: obi
      # OBI attaches to processes in other pods, so it needs to see the
      # host PID namespace. Together with privileged below, this is the
      # trade you make for not touching the application.
      hostPID: true
      containers:
        - name: obi
          image: otel/ebpf-instrument:v0.10.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            readOnlyRootFilesystem: false
          env:
            - name: OTEL_EBPF_LOG_LEVEL
              value: "DEBUG"
            # Prints from inside the BPF programs. Very loud; turn off
            # unless you are debugging probe attachment.
            - name: OTEL_EBPF_BPF_DEBUG
              value: "true"

            - name: OTEL_EBPF_CONFIG_PATH
              value: '/config/obi-config.yml'

            # Matches the executable path, not the command line. The JVM
            # runs as /opt/java/openjdk/bin/java, so the obvious-looking
            # '*.jar' silently matches nothing.
            - name: OTEL_EBPF_AUTO_TARGET_EXE
              value: '*/java'

            # Puts pod, namespace and deployment names on spans.
            - name: OTEL_EBPF_KUBE_METADATA_ENABLE
              value: 'true'

            # Free-form label; shows up as the cluster attribute on spans.
            - name: OTEL_EBPF_KUBE_CLUSTER_NAME
              value: 'minikube-poc'

          volumeMounts:
            - mountPath: /config
              name: obi-config
            - mountPath: /var/run/obi
              name: var-run-obi

            # Where pinned BPF objects live. Bidirectional so pins made
            # here stay visible on the node.
            - mountPath: /sys/fs/bpf
              name: sys-fs-bpf
              mountPropagation: Bidirectional

            # Needed to attach probes via tracefs.
            - mountPath: /sys/kernel/debug
              name: sys-kernel-debug

      volumes:
        - name: obi-config
          configMap:
            name: obi-config
        - name: var-run-obi
          emptyDir: {}
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            # More forgiving than Beyla, which needs the directory to
            # exist already.
            type: DirectoryOrCreate
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
