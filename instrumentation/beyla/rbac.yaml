---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beyla
  # Must match the namespace the DaemonSet runs in, otherwise the pod
  # cannot start. The DaemonSet sets none, so it lands wherever your
  # kubectl context points.
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: beyla
rules:
  # Target discovery. Without this Beyla still traces, but spans are
  # labelled with bare PIDs instead of pod and service names.
  - apiGroups: [""]
    resources:
      - pods
      - services
      - nodes
      - namespaces
    verbs:
      - get
      - list
      - watch

  # Walks pod owners up to the Deployment, so a span reads
  # "java17-service" rather than the ReplicaSet hash.
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: beyla
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: beyla
subjects:
  - kind: ServiceAccount
    name: beyla
    namespace: default  # Keep in sync with the ServiceAccount above.
