apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ebpf-poc
type: Opaque
data:
  # "postgres", base64 encoded. Base64 is encoding, not encryption, and a
  # committed Secret is a plaintext password with extra steps. Fine for a
  # throwaway local cluster, not for anything else.
  POSTGRES_PASSWORD: cG9zdGdyZXM=
