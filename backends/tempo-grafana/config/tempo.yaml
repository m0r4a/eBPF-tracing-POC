# Tempo 3.0 in monolithic mode. The 3.0 release reorganised this file:
# `ingester:` and `compactor:` are gone, and so is
# `metrics_generator.traces_storage`. A 2.x config will not load.
server:
  http_listen_port: 3200
  grpc_listen_port: 9096
  log_level: info

# Receives spans from the agents. 0.0.0.0 so it accepts from outside the
# container.
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Tempo 3.0 replaced the `compactor:` block with a scheduler and worker
# pair. In monolithic mode both run inside the single binary.
backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 12h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /var/tempo/generator/wal

# Local disk, backed by the tempo-data-2 volume. Fine for a laptop, not
# how you would run this for real.
storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
      generate_native_histograms: both

usage_report:
  reporting_enabled: false
